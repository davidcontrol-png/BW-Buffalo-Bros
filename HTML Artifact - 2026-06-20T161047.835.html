<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Canje · Buffalo Wings®</title>
<link rel="icon" href="https://gobuff.com/sv/favicon.png">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Oswald',sans-serif;background:radial-gradient(circle at 50% 20%,#2a0606,#0a0000);min-height:100vh;padding:16px;color:#fff;display:flex;justify-content:center}
.card{width:100%;max-width:440px;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.6);margin:auto}
.head{background:linear-gradient(135deg,#7B1A1A,#a02020);padding:18px 16px;display:flex;align-items:center;gap:12px}
.head img{width:48px;height:48px;border-radius:8px;border:2px solid rgba(255,255,255,.3)}
.head h1{font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;color:#fff;line-height:1}
.head p{font-size:11px;color:rgba(255,200,100,.85);letter-spacing:2px}
.body{padding:20px;color:#2a0606}
.status{text-align:center;padding:14px;border-radius:12px;margin-bottom:16px;font-weight:700;font-size:15px}
.ok{background:#e8f8ec;color:#1e8449;border:2px solid #2ecc71}
.warn{background:#fff4e5;color:#c0392b;border:2px solid #e67e22}
.bad{background:#fdecea;color:#c0392b;border:2px solid #e74c3c}
.row{display:flex;justify-content:space-between;padding:10px 4px;border-bottom:1px solid #eee}
.row:last-child{border:none}
.lbl{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px}
.val{font-weight:600;font-size:15px;text-align:right;word-break:break-all;max-width:60%}
.val.big{font-family:'Bebas Neue';font-size:26px;color:#c84d00}
.tok{background:#7B1A1A;color:#fff;padding:3px 10px;border-radius:5px;font-family:'Bebas Neue';letter-spacing:2px}
button{width:100%;margin-top:18px;padding:16px;border:none;border-radius:12px;font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:#fff;cursor:pointer;background:linear-gradient(135deg,#FF6B00,#c84d00)}
button.secondary{background:#7B1A1A;font-size:16px;padding:12px;margin-top:10px}
button:disabled{opacity:.5;cursor:default}
.foot{background:#7B1A1A;text-align:center;padding:10px;font-size:11px;color:rgba(255,200,100,.7);letter-spacing:1px}
.spin{text-align:center;padding:40px;font-size:30px;animation:s 1s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.pinbox{margin-top:14px;background:#f7f7f7;border:1px dashed #ccc;border-radius:12px;padding:14px;text-align:center}
.pinbox label{display:block;font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.pinbox input{width:140px;text-align:center;font-family:'Bebas Neue';font-size:30px;letter-spacing:8px;padding:8px;border:2px solid #7B1A1A;border-radius:10px;color:#7B1A1A}
.msg{margin-top:10px;font-size:13px;font-weight:600}
.msg.err{color:#c0392b}
.hidden{display:none}
#reader{width:100%;max-width:300px;margin:14px auto 0;border-radius:12px;overflow:hidden;display:none}
.scan-hint{font-size:13px;color:#7a5640;margin-top:8px;min-height:16px;text-align:center}
</style></head><body>
<div class="card">
  <div class="head"><img src="https://gobuff.com/sv/favicon.png" onerror="this.src='https://gobuff.com/favicon.png'"><div><h1>BUFFALO WINGS®</h1><p>VALIDACIÓN DE CANJE · CAJA</p></div></div>
  <div class="body" id="body"><div class="spin">⏳</div></div>
  <div class="foot">🦬 SOCAZONEBW.COM · SISTEMA DE LEALTAD</div>
</div>
<script>
/* ===== CONFIG ===== */
const REQUIERE_PIN = true;          // poné false si NO querés pedir PIN de cajero
const PIN_LOCAL    = "1234";        // PIN de respaldo si NO validás en el servidor
/* ================== */

const q=new URLSearchParams(location.search),id=q.get('id'),body=document.getElementById('body');
const esc=s=>(s||'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate=s=>{const d=new Date(s);return isNaN(d)?esc(s||'—'):d.toLocaleString('es');};

/* ===== ESCÁNER DE QR (Modelo B) ===== */
let _qr=null;
function stopScan(cb){ if(_qr){ _qr.stop().then(()=>{_qr=null;cb&&cb();}).catch(()=>{_qr=null;cb&&cb();}); } else { cb&&cb(); } }
function applyScanned(text){
  let search='';
  try{ search=new URL(text).search; }catch(e){ const m=document.getElementById('scanMsg'); if(m)m.textContent='⚠️ QR no válido para canje'; return; }
  if(!search){ const m=document.getElementById('scanMsg'); if(m)m.textContent='⚠️ El QR no tiene datos de canje'; return; }
  // Recarga canje.html con los parámetros del QR → dispara load() con verificación en BBDD
  location.search = search;
}
function startScan(){
  const reader=document.getElementById('reader'), msg=document.getElementById('scanMsg'), btn=document.getElementById('btnScan');
  if(_qr){ stopScan(()=>{reader.style.display='none';msg.textContent='';btn.textContent='📷 ESCANEAR QR DE CANJE';}); return; }
  if(typeof Html5Qrcode==='undefined'){ msg.textContent='No se pudo cargar el lector (revisá tu conexión).'; return; }
  reader.style.display='block'; msg.textContent='Apuntá la cámara al QR del cliente…'; btn.textContent='✕ CANCELAR';
  _qr=new Html5Qrcode('reader');
  _qr.start({facingMode:'environment'},{fps:10,qrbox:240},
    decoded=>{ msg.textContent='✅ QR leído, cargando…'; stopScan(()=>applyScanned(decoded)); },
    ()=>{}
  ).catch(err=>{ msg.textContent='No se pudo abrir la cámara: '+err; reader.style.display='none'; _qr=null; btn.textContent='📷 ESCANEAR QR DE CANJE'; });
}
function showScanLanding(){
  body.innerHTML =
     '<div class="status warn" style="border-color:#e67e22">📷 ESCANEÁ EL QR DEL CLIENTE<br><small>Para validar el canje en caja</small></div>'
    +'<div style="text-align:center">'
    +'<button id="btnScan">📷 ESCANEAR QR DE CANJE</button>'
    +'<div id="reader"></div>'
    +'<div class="scan-hint" id="scanMsg"></div>'
    +'</div>';
  document.getElementById('btnScan').onclick=startScan;
}

function render(d,verified,redeemed){
  let st = redeemed ? '<div class="status warn">⚠️ TICKET YA CANJEADO<br><small>'+fmtDate(d.redeemedAt)+'</small></div>'
    : verified ? '<div class="status ok">✅ TICKET VÁLIDO · VERIFICADO</div>'
    : '<div class="status bad">⚠️ NO VERIFICADO EN BBDD<br><small>Datos solo del QR · No marcar como canjeado</small></div>';

  let html = st
    +'<div class="row"><span class="lbl">📧 Correo</span><span class="val">'+esc(d.email)+'</span></div>'
    +'<div class="row"><span class="lbl">🏆 Puntos</span><span class="val big">'+(+d.score||0).toLocaleString('es')+'</span></div>'
    +'<div class="row"><span class="lbl">🪙 Monedas</span><span class="val">'+esc(String(d.coins||0))+'</span></div>'
    +'<div class="row"><span class="lbl">🎁 Premios</span><span class="val">'+esc(d.evtxt)+'</span></div>'
    +'<div class="row"><span class="lbl">🎮 Equipo</span><span class="val">'+esc(d.team)+'</span></div>'
    +'<div class="row"><span class="lbl">📅 Fecha</span><span class="val">'+fmtDate(d.date)+'</span></div>'
    +'<div class="row"><span class="lbl">🔑 Token</span><span class="val"><span class="tok">'+esc(d.token)+'</span></span></div>';

  // Solo se puede canjear si está VERIFICADO en la base y NO canjeado
  if(verified && !redeemed){
    if(REQUIERE_PIN){
      html += '<div class="pinbox" id="pinbox">'
            + '<label>PIN de cajero</label>'
            + '<input id="pin" type="password" inputmode="numeric" maxlength="6" autocomplete="off" placeholder="••••">'
            + '<div class="msg err hidden" id="pinmsg">PIN incorrecto</div>'
            + '</div>';
    }
    html += '<button id="rd">✓ MARCAR COMO CANJEADO</button>';
  }
  // Botón para escanear el siguiente ticket (siempre disponible)
  html += '<button class="secondary" id="scanAgain">📷 ESCANEAR OTRO QR</button>';

  body.innerHTML = html;

  if(verified && !redeemed){
    document.getElementById('rd').onclick = doRedeem;
  }
  document.getElementById('scanAgain').onclick = showScanLanding;
}

async function doRedeem(){
  const btn = document.getElementById('rd');
  let pin = '';
  if(REQUIERE_PIN){
    const inp = document.getElementById('pin');
    pin = (inp.value||'').trim();
    if(!pin){ inp.focus(); return; }
    // Validación local de respaldo (la real la hace el servidor)
    if(PIN_LOCAL && pin !== PIN_LOCAL){
      const m=document.getElementById('pinmsg'); m.classList.remove('hidden'); inp.value=''; inp.focus(); return;
    }
  }
  if(!confirm('¿Confirmás el canje de este ticket? Esta acción no se puede deshacer.')) return;

  btn.disabled = true; btn.textContent = '⏳…';
  try{
    const r = await fetch('/api/score?id='+encodeURIComponent(id), {
      method:'PUT',
      headers: REQUIERE_PIN ? {'x-cashier-pin': pin} : {}
    });
    if(r.status === 401 || r.status === 403){
      btn.disabled = false; btn.textContent = '✓ MARCAR COMO CANJEADO';
      const m=document.getElementById('pinmsg'); if(m){m.textContent='PIN rechazado por el servidor'; m.classList.remove('hidden');}
      return;
    }
    if(!r.ok){ throw new Error('HTTP '+r.status); }
    load(); // recarga y muestra el estado "ya canjeado"
  }catch(e){
    btn.textContent = 'ERROR · REINTENTAR';
    btn.disabled = false;
  }
}

async function load(){
  // Si no llegó ningún dato por URL → mostrar pantalla para escanear
  const hasData = id || q.get('e') || q.get('t');
  if(!hasData){ showScanLanding(); return; }

  const ev=q.get('ev')||'';const m=ev.match(/p(\d+)r(\d+)n(\d+)e(\d+)/)||[];
  const evtxt='⚽'+(m[1]||0)+' 🟥'+(m[2]||0)+' 🥅'+(m[3]||0)+' 🤝'+(m[4]||0);
  const fromQR={email:q.get('e'),score:q.get('p')||0,coins:q.get('m')||0,team:q.get('eq'),date:q.get('f'),token:q.get('t'),evtxt};

  if(!id){ render(fromQR,false,false); return; }
  body.innerHTML = '<div class="spin">⏳</div>';
  try{
    const r=await fetch('/api/score?id='+encodeURIComponent(id));
    if(!r.ok){ render(fromQR,false,false); return; }
    const d=await r.json();const e=d.events||{};
    render({
      ...d,
      evtxt:'⚽'+(e.poste||0)+' 🟥'+(e.roja||0)+' 🥅'+(e.penal||0)+' 🤝'+(e.empate||0),
      token:(d.token || (id.split('-')[0])),
      date:d.date
    }, true, d.redeemed);
  }catch(e){ render(fromQR,false,false); }
}
load();
</script></body></html>
